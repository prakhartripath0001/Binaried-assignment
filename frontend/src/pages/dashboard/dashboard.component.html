<main class="page">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Dashboard</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p *ngIf="tasks.length === 0">No tasks yet.</p>

      <section class="task-grid">
        <mat-card class="task-card" *ngFor="let task of tasks">
          <mat-card-title>{{ task.title }}</mat-card-title>
          <mat-card-content>
            <p *ngIf="task.description">{{ task.description }}</p>
            <p><strong>Priority:</strong> {{ task.priority }}</p>
            <p><strong>Status:</strong> {{ task.status }}</p>
          </mat-card-content>
          <mat-card-actions>
            <button mat-button type="button" [routerLink]="['/tasks', task._id, 'edit']">Edit</button>
            <button mat-button color="warn" type="button" (click)="deleteTask(task)">Delete</button>
          </mat-card-actions>
        </mat-card>
      </section>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" routerLink="/tasks/create">Create Task</button>
    </mat-card-actions>
  </mat-card>
</main>
