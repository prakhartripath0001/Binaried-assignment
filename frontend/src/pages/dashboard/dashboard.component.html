<main class="page">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Dashboard</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p *ngIf="tasks.length === 0">No tasks yet.</p>

      <mat-list>
        <mat-list-item *ngFor="let task of tasks">
          <mat-checkbox [checked]="task.completed" (change)="toggleTask(task)">
            {{ task.title }}
          </mat-checkbox>
          <span class="description">{{ task.description }}</span>
          <button mat-button type="button" [routerLink]="['/tasks', task._id, 'edit']">Edit</button>
          <button mat-button color="warn" type="button" (click)="deleteTask(task)">Delete</button>
        </mat-list-item>
      </mat-list>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" routerLink="/tasks/create">Create Task</button>
    </mat-card-actions>
  </mat-card>
</main>
